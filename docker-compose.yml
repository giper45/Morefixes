services:
  postgres:
    image: postgres:17
    command: postgres -c 'max_connections=1000'
    container_name: morefixes_db
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data2:/var/lib/postgresql/data
      - ./postgrescvedumper-2024-09-26.sql:/docker-entrypoint-initdb.d/postgrescvedumper-2024-09-26.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./docker
      dockerfile: webapp.Dockerfile
    container_name: morefixes_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      POSTGRES_HOST: postgres
      APP_HOST: 0.0.0.0
      APP_PORT: 9999
    ports:
      - "9999:9999"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "pip install --no-cache-dir -r requirements.app.txt && python run.py"]

  frontend:
    build:
      context: ./docker
      dockerfile: webapp.Dockerfile
    container_name: morefixes_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      POSTGRES_HOST: postgres
      APP_HOST: 0.0.0.0
      APP_PORT: 9999
    ports:
      - "9998:9999"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "pip install --no-cache-dir -r requirements.app.txt && python run.py"]

  pgadmin:
    image: dpage/pgadmin4
    container_name: morefixes_pgadmin
    restart: always
    ports:
      - "8888:80"  # Exposes pgAdmin on port 8888
    environment:
      # These set your login for the pgAdmin web interface
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@morefixes.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - ./servers.json/servers.json:/pgadmin4/servers.json:ro
      - ./servers.json/pgpass:/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data2:
